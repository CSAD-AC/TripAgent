spring:
  application:
    name: mcp-server

  config:
    import: optional:classpath:.env[.properties]

  ai:
    mcp:
      server:
        enabled: true
        protocol: STREAMABLE
        name: amap-mcp-server
        version: 1.0.0
        type: SYNC

server:
  port: 8081

amap:
  api:
    key: ${AMAP_API_KEY}

# 云端搜索配置（替换原自建 Bing 爬虫）
search:
  cloud:
    provider: baidu-tavily-fallback  # 搜索后端：baidu / tavily / baidu-tavily-fallback
    baidu-api-key: ${BAIDU_API_KEY}
    tavily-api-key: ${TAVILY_API_KEY}
# 页面抓取配置
fetch:
  timeout-seconds: 15       # 单次抓取超时（页面下载比搜索慢）
  max-content-length: 5000  # 正文最大返回字符数（防 token 爆炸）

logging:
  level:
    uno.zhuchen.agent.mcpserver: DEBUG
