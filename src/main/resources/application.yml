spring:
  application:
    name: Agent

  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen-max

agent:
  react:
    max-iterations: 10
    timeout-seconds: 30

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    uno.zhuchen.agent: DEBUG
    org.springframework.ai: INFO
---
spring:
  config:
    activate:
      on-profile: dev
  ai:
    dashscope:
      chat:
        options:
          model: qwen-turbo
